<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>usearch12 WASM Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: #58a6ff; }
  .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
  .status.loading { background: #161b22; border: 1px solid #30363d; }
  .status.ready { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
  .status.error { background: #2d1114; border: 1px solid #da3633; color: #f85149; }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 1rem; color: #8b949e; margin-bottom: 12px; }
  label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 4px; }
  select, input, textarea { width: 100%; padding: 8px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: monospace; font-size: 0.85rem; margin-bottom: 10px; }
  textarea { min-height: 120px; resize: vertical; }
  button { padding: 8px 16px; border-radius: 6px; border: 1px solid #30363d; background: #238636; color: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .output { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 0.82rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; line-height: 1.5; }
  .output .stderr { color: #f0883e; }
  .output .stdout { color: #c9d1d9; }
  .output .info { color: #58a6ff; }
  .tests { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tests button { background: #21262d; font-size: 0.8rem; padding: 6px 12px; }
  .tests button:hover { background: #30363d; }
  .file-upload { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .file-upload input[type=file] { border: none; padding: 0; }
</style>
</head>
<body>

<h1>usearch12 — WebAssembly</h1>
<div id="status" class="status loading">Loading WASM module...</div>

<div class="panel">
  <h2>Quick Tests</h2>
  <div class="tests">
    <button onclick="runTest('help')" class="test-btn">Show Help</button>
    <button onclick="runTest('cluster')" class="test-btn">cluster_fast</button>
    <button onclick="runTest('uniques')" class="test-btn">fastx_uniques</button>
    <button onclick="runTest('orient')" class="test-btn">fastx_orient</button>
  </div>
</div>

<div class="panel">
  <h2>Custom Command</h2>
  <div class="file-upload">
    <label style="margin:0;white-space:nowrap;">Upload FASTA/FASTQ:</label>
    <input type="file" id="fileInput" accept=".fasta,.fa,.fna,.fastq,.fq,.gz">
  </div>
  <label>Command arguments (one per line or space-separated):</label>
  <input type="text" id="cmdArgs" placeholder="-cluster_fast /input.fasta -id 0.97 -centroids /out.fasta -threads 1 -quiet">
  <label>Input sequences (written to /input.fasta):</label>
  <textarea id="inputSeqs" placeholder=">seq1
ATCGATCGATCG
>seq2
GCTAGCTAGCTA"></textarea>
  <button id="runBtn" onclick="runCustom()" disabled>Run usearch</button>
</div>

<div class="panel">
  <h2>Output</h2>
  <div id="output" class="output"><span class="info">Waiting for module to load...</span></div>
</div>

<script src="./build/usearch.js"></script>
<script>
// createUsearch is now available as a global from the script above

var moduleReady = false;

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderOutput(stdout, stderr, files) {
  var out = document.getElementById('output');
  var html = '';
  if (stderr.length) {
    html += '<span class="stderr">' + escapeHtml(stderr.join('\n')) + '</span>\n';
  }
  if (stdout.length) {
    html += '<span class="stdout">' + escapeHtml(stdout.join('\n')) + '</span>\n';
  }
  for (var name in files) {
    html += '\n<span class="info">--- ' + escapeHtml(name) + ' ---</span>\n';
    html += '<span class="stdout">' + escapeHtml(files[name]) + '</span>\n';
  }
  if (!html) html = '<span class="info">Command completed with no output.</span>';
  out.innerHTML = html;
}

function freshModule() {
  var stdout = [];
  var stderr = [];
  return createUsearch({
    noInitialRun: true,
    print: function(t) { stdout.push(t); },
    printErr: function(t) { stderr.push(t); },
  }).then(function(Module) {
    return { Module: Module, stdout: stdout, stderr: stderr };
  });
}

var TEST_FASTA = [
  '>seq1', 'ATCGATCGATCGATCGATCGATCGATCGATCG',
  '>seq2', 'ATCGATCGATCGATCGATCGATCGATCGATCG',
  '>seq3', 'GCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTA',
  '>seq4', 'ATCGATCGATCGATCGATCGAAAAAAAATCG',
  '>seq5', 'GCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTA',
].join('\n') + '\n';

function runTest(test) {
  if (!moduleReady) return;
  document.getElementById('output').innerHTML = '<span class="info">Running...</span>';

  freshModule().then(function(ctx) {
    var Module = ctx.Module, stdout = ctx.stdout, stderr = ctx.stderr;
    var files = {};

    try {
      switch (test) {
        case 'help':
          Module.callMain([]);
          break;
        case 'cluster':
          Module.FS.writeFile('/input.fasta', TEST_FASTA);
          Module.callMain(['-cluster_fast', '/input.fasta', '-id', '0.9',
            '-centroids', '/centroids.fasta', '-threads', '1', '-quiet']);
          try { files['/centroids.fasta'] = Module.FS.readFile('/centroids.fasta', { encoding: 'utf8' }); } catch(e) {}
          break;
        case 'uniques':
          Module.FS.writeFile('/input.fasta', TEST_FASTA);
          Module.callMain(['-fastx_uniques', '/input.fasta',
            '-fastaout', '/uniques.fasta', '-sizeout', '-threads', '1', '-quiet']);
          try { files['/uniques.fasta'] = Module.FS.readFile('/uniques.fasta', { encoding: 'utf8' }); } catch(e) {}
          break;
        case 'orient':
          Module.FS.writeFile('/input.fasta', TEST_FASTA);
          Module.FS.writeFile('/ref.fasta', '>ref\nATCGATCGATCGATCGATCGATCGATCGATCG\n');
          Module.callMain(['-fastx_orient', '/input.fasta', '-db', '/ref.fasta',
            '-fastaout', '/oriented.fasta', '-threads', '1', '-quiet']);
          try { files['/oriented.fasta'] = Module.FS.readFile('/oriented.fasta', { encoding: 'utf8' }); } catch(e) {}
          break;
      }
    } catch (e) { /* exit throws */ }

    renderOutput(stdout, stderr, files);
  });
}

function runCustom() {
  if (!moduleReady) return;
  document.getElementById('output').innerHTML = '<span class="info">Running...</span>';

  var inputSeqs = document.getElementById('inputSeqs').value.trim();
  var fileInput = document.getElementById('fileInput');
  var argsStr = document.getElementById('cmdArgs').value.trim();
  var args = argsStr.split(/\s+/).filter(function(a) { return a.length > 0; });

  var filePromise;
  if (fileInput.files.length > 0) {
    filePromise = fileInput.files[0].arrayBuffer();
  } else {
    filePromise = Promise.resolve(null);
  }

  filePromise.then(function(fileBuf) {
    return freshModule().then(function(ctx) {
      var Module = ctx.Module, stdout = ctx.stdout, stderr = ctx.stderr;

      if (inputSeqs) {
        Module.FS.writeFile('/input.fasta', inputSeqs + '\n');
      }
      if (fileBuf) {
        Module.FS.writeFile('/input.fasta', new Uint8Array(fileBuf));
      }

      try {
        Module.callMain(args);
      } catch (e) { /* exit throws */ }

      var files = {};
      var outFlags = ['-fastaout', '-fastqout', '-centroids', '-consout', '-tabbedout',
        '-alnout', '-blast6out', '-uc', '-matched', '-notmatched', '-dbmatched',
        '-dbnotmatched', '-output'];
      for (var i = 0; i < args.length - 1; i++) {
        if (outFlags.indexOf(args[i]) !== -1) {
          try { files[args[i + 1]] = Module.FS.readFile(args[i + 1], { encoding: 'utf8' }); } catch(e) {}
        }
      }

      renderOutput(stdout, stderr, files);
    });
  });
}

// Initialize
createUsearch({
  noInitialRun: true,
  print: function() {},
  printErr: function() {},
}).then(function() {
  moduleReady = true;
  document.getElementById('status').className = 'status ready';
  document.getElementById('status').textContent = 'Module loaded — ready to run commands';
  document.getElementById('runBtn').disabled = false;
  document.getElementById('output').innerHTML = '<span class="info">Module loaded. Click a quick test or enter a custom command.</span>';
}).catch(function(e) {
  document.getElementById('status').className = 'status error';
  document.getElementById('status').textContent = 'Failed to load: ' + e.message;
  document.getElementById('output').innerHTML = '<span class="stderr">' + e.message + '\n\nMake sure you are serving with COOP/COEP headers:\n  node serve.mjs</span>';
});
</script>

</body>
</html>
